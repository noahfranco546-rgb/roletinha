<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Web Terminal</title>
    <style>
        body { background-color: #121212; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; }
        #terminal { width: 100%; height: 400px; overflow-y: auto; border: 1px solid #333; padding: 10px; margin-bottom: 10px; }
        #input-line { display: flex; }
        #prompt { margin-right: 10px; }
        input { background: transparent; border: none; color: #0f0; outline: none; flex: 1; font-family: inherit; font-size: 16px; }
    </style>
</head>
<body>

    <div id="terminal">
        <div>-- Descubra os comandos ai --</div>
    </div>
    
    <div id="input-line">
        <span id="prompt">userfullcond@python:~$</span>
        <input type="text" id="cmd-input" autofocus>
    </div>

    <script>
        const input = document.getElementById('cmd-input');
        const terminal = document.getElementById('terminal');

        input.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const comando = input.value;
                input.value = '';

                // Exibe no terminal local
                imprimir(`> ${comando}`);

                // Envia para o backend FastAPI (URL relativa)
                try {
                    const response = await fetch('/api/command', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ comando: comando })
                    });
                    const data = await response.json();
                    imprimir(data.output);
                } catch (err) {
                    imprimir("Erro: Não foi possível conectar ao servidor. Verifique se o servidor está rodando.");
                }
            }
        });

        function imprimir(texto) {
            const div = document.createElement('div');
            div.textContent = texto;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight; // Auto-scroll
        }
    </script>
</body>
</html>
