<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>.Sort POKÉDEX </title>
  <style>
    :root{
      --bg: #0f1724;
      --card: linear-gradient(180deg,#0b1220,#0f2140);
      --accent: #7c3aed;
      --muted: #94a3b8;
      --glass: rgba(255,255,255,0.03);
    }
    *{box-sizing:border-box}
    body{font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; background:var(--bg); color:#e6eef8; margin:0; padding:2rem}
    .container{max-width:960px;margin:0 auto}
    header{display:flex;align-items:center;justify-content:space-between;gap:1rem}
    h1{font-size:1.6rem;margin:0}
    .controls{display:flex;gap:.5rem}
    button{background:var(--accent);border:none;color:white;padding:.6rem .9rem;border-radius:8px;cursor:pointer;font-weight:600}
    main{display:grid;grid-template-columns:1fr 320px;gap:1rem;margin-top:1rem}
    .panel{background:var(--card);padding:1rem;border-radius:12px;box-shadow:0 6px 18px rgba(2,6,23,0.6)}
    .result{min-height:220px;overflow:auto;padding:.5rem;border-radius:8px;background:var(--glass);border:1px solid rgba(255,255,255,0.02)}
    .list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:.4rem}
    .list li{padding:.6rem .8rem;background:linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:8px;color:#eaf2ff}
    .meta{color:var(--muted);font-size:.9rem;margin-bottom:.6rem}
    footer{margin-top:1rem;color:var(--muted);font-size:.85rem}
    @media (max-width:800px){main{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>.Sort POKÉDEX</h1>
      <div class="controls">
        <button id="btn-list-users">Listar usuários</button>
        <button id="btn-list-elements">Listar elementos</button>
        <button id="btn-draw-pair">Sortear par</button>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="meta">Resultado</div>
        <div id="result" class="result">Clique em um botão para começar.</div>
        <footer>
          Se quiser dar reset é so recarregar a pagina :D
        </footer>
      </section>

      <aside class="panel">
        <div class="meta">Contadores</div>
        <div id="counts" class="result">Carregando...</div>
      </aside>
    </main>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const result = $('result');
    const counts = $('counts');

    async function api(path, method='GET'){ 
      const resp = await fetch(path, { method });
      if(!resp.ok) throw new Error('Erro na requisição');
      return await resp.json();
    }

    function renderList(title, arr){
      if(!arr || arr.length === 0) return `<div class="meta">${title}</div><div class="muted">(vazio)</div>`;
      const items = arr.map(i => `<li>${i}</li>`).join('');
      return `<div class="meta">${title} — ${arr.length}</div><ul class="list">${items}</ul>`;
    }

    async function refreshCounts(){
      try{
        const u = await api('/api/users');
        const e = await api('/api/elements');
        counts.innerHTML = `<div class=\"meta\">Usuários: ${u.users.length}</div><div class=\"meta\">Elementos: ${e.elements.length}</div>`;
      }catch(err){
        counts.textContent = 'Não foi possível atualizar contadores.';
      }
    }

    // Ações dos botões
    $('btn-list-users').addEventListener('click', async () => {
      try{
        const data = await api('/api/users');
        result.innerHTML = renderList('Usuários', data.users);
      }catch(err){ result.textContent = 'Erro ao buscar usuários.' }
    });

    $('btn-list-elements').addEventListener('click', async () => {
      try{
        const data = await api('/api/elements');
        result.innerHTML = renderList('Elementos', data.elements);
      }catch(err){ result.textContent = 'Erro ao buscar elementos.' }
    });

    $('btn-draw-user').addEventListener('click', async () => {
      try{
        const data = await api('/api/draw/user', 'POST');
        result.innerHTML = `<div class=\"meta\">Sorteado usuário</div><div style=\"font-weight:700;margin-top:.6rem\">${data.user}</div>`;
        await refreshCounts();
      }catch(err){ result.textContent = 'Erro ao sortear usuário.' }
    });

    $('btn-draw-element').addEventListener('click', async () => {
      try{
        const data = await api('/api/draw/element', 'POST');
        result.innerHTML = `<div class=\"meta\">Sorteado elemento</div><div style=\"font-weight:700;margin-top:.6rem\">${data.element}</div>`;
        await refreshCounts();
      }catch(err){ result.textContent = 'Erro ao sortear elemento.' }
    });

    // sortear par usuario+elemento
    $('btn-draw-pair').addEventListener('click', async () => {
      try{
        const data = await api('/api/draw/pair', 'POST');
        if(data.error){ result.textContent = 'Erro: ' + data.error; return }
        result.innerHTML = `<div class=\"meta\">Sorteado par</div>` +
          `<div style=\"font-weight:700;margin-top:.6rem\">Usuário: ${data.usuario}</div>` +
          `<div style=\"font-weight:700;margin-top:.3rem\">Elemento: ${data.elemento}</div>`;
        await refreshCounts();
      }catch(err){ result.textContent = 'Erro ao sortear par.' }
    });

    // init: garantir que o backend reinicie as listas ao carregar a página
    (async function init(){
      try{
        await fetch('/api/reset', { method: 'POST' });
      }catch(e){ /* ignore */ }
      await refreshCounts();
    })();
  </script>
</body>
</html>
